<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 580" font-family="Inter, system-ui, sans-serif">
  <rect width="1280" height="580" fill="#f4f2ec"/>

  <!-- title -->
  <text x="40" y="56" font-size="30" font-style="italic" font-family="Instrument Serif, Georgia, serif" fill="#16140d">Relay</text>
  <text x="180" y="56" font-size="16" fill="#777163">a multi-agent intake to quote pipeline</text>
  <text x="40" y="82" font-size="12" letter-spacing="2" fill="#777163">AUTONOMOUS REASONING · REAL TOOLS · HUMAN SIGN-OFF · POWERED BY QWEN CLOUD</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b3ab99"/>
    </marker>
  </defs>

  <!-- inquiry -->
  <rect x="40" y="132" width="150" height="100" rx="14" fill="#fff" stroke="#e7e2d6"/>
  <text x="115" y="174" font-size="22" text-anchor="middle">✉</text>
  <text x="115" y="202" font-size="13" font-weight="600" text-anchor="middle" fill="#16140d">Inquiry</text>
  <text x="115" y="220" font-size="10.5" text-anchor="middle" fill="#777163">messy message</text>
  <line x1="190" y1="182" x2="232" y2="182" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 1 Gwen · Intake Qualifier (LLM) -->
  <rect x="234" y="132" width="186" height="100" rx="14" fill="#eef0fb" stroke="#cdd3f6"/>
  <circle cx="258" cy="162" r="13" fill="#3a48d6"/>
  <text x="258" y="166" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">G</text>
  <text x="280" y="160" font-size="15" font-weight="600" fill="#16140d">Gwen</text>
  <text x="280" y="176" font-size="11" fill="#3a48d6">Intake Qualifier</text>
  <text x="252" y="200" font-size="11.5" fill="#544f43">reads intent · urgency · gaps</text>
  <text x="252" y="220" font-size="10.5" font-family="monospace" fill="#3a48d6">qwen3.5-flash · Qwen Cloud</text>
  <line x1="420" y1="182" x2="462" y2="182" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2 Max · Quote Specialist (LLM + tools) -->
  <rect x="464" y="132" width="200" height="100" rx="14" fill="#eef0fb" stroke="#cdd3f6"/>
  <circle cx="488" cy="162" r="13" fill="#0f9d58"/>
  <text x="488" y="166" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">M</text>
  <text x="510" y="160" font-size="15" font-weight="600" fill="#16140d">Max</text>
  <text x="510" y="176" font-size="11" fill="#0f9d58">Quote Specialist</text>
  <text x="482" y="200" font-size="11.5" fill="#544f43">tool-calling loop builds quote</text>
  <text x="482" y="220" font-size="10.5" font-family="monospace" fill="#3a48d6">qwen3.7-max · Qwen Cloud</text>

  <!-- tools callout -->
  <rect x="464" y="244" width="220" height="48" rx="12" fill="#fff" stroke="#e0dac9" stroke-dasharray="4 4"/>
  <text x="482" y="264" font-size="10" letter-spacing="1.5" fill="#777163">REAL TOOLS</text>
  <text x="482" y="282" font-size="11" font-family="monospace" fill="#16140d">get_pricing_book · check_calendar · save_quote</text>
  <line x1="564" y1="232" x2="564" y2="242" stroke="#cdd3f6" stroke-width="1.5"/>

  <line x1="664" y1="182" x2="706" y2="182" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 Ledger · Validator (deterministic) -->
  <rect x="708" y="132" width="172" height="100" rx="14" fill="#fff" stroke="#e7e2d6"/>
  <circle cx="732" cy="162" r="13" fill="#b45309"/>
  <text x="732" y="166" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">L</text>
  <text x="754" y="160" font-size="15" font-weight="600" fill="#16140d">Ledger</text>
  <text x="754" y="176" font-size="11" fill="#b45309">Validator</text>
  <text x="726" y="200" font-size="11.5" fill="#544f43">recomputes every total</text>
  <text x="726" y="220" font-size="10.5" font-family="monospace" fill="#777163">deterministic</text>
  <line x1="880" y1="182" x2="922" y2="182" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4 Sentry · Risk Router (deterministic) -->
  <rect x="924" y="132" width="172" height="100" rx="14" fill="#fff" stroke="#e7e2d6"/>
  <circle cx="948" cy="162" r="13" fill="#c01f6c"/>
  <text x="948" y="166" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">S</text>
  <text x="970" y="160" font-size="15" font-weight="600" fill="#16140d">Sentry</text>
  <text x="970" y="176" font-size="11" fill="#c01f6c">Risk Router</text>
  <text x="942" y="200" font-size="11.5" fill="#544f43">tiers low / high risk</text>
  <text x="942" y="220" font-size="10.5" font-family="monospace" fill="#777163">deterministic</text>

  <!-- down to human gate -->
  <line x1="1010" y1="232" x2="1010" y2="298" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- HUMAN GATE -->
  <rect x="708" y="302" width="388" height="76" rx="14" fill="#fdf3e2" stroke="#f0d9a8"/>
  <text x="902" y="330" font-size="20" text-anchor="middle">👤</text>
  <text x="902" y="354" font-size="14" font-weight="700" text-anchor="middle" fill="#b45309">HUMAN GATE · pending_approval</text>
  <text x="902" y="371" font-size="11.5" text-anchor="middle" fill="#7a5a18">dispatcher approves, edits, or rejects. nothing is sent without sign-off</text>
  <line x1="708" y1="340" x2="666" y2="340" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5 Quill · Confirmation Writer -->
  <rect x="464" y="302" width="200" height="76" rx="14" fill="#eef0fb" stroke="#cdd3f6"/>
  <circle cx="488" cy="330" r="13" fill="#7a5cd0"/>
  <text x="488" y="334" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">Q</text>
  <text x="510" y="328" font-size="15" font-weight="600" fill="#16140d">Quill</text>
  <text x="510" y="344" font-size="11" fill="#7a5cd0">Confirmation Writer</text>
  <text x="482" y="367" font-size="10.5" font-family="monospace" fill="#3a48d6">qwen3.5-flash · Qwen Cloud</text>
  <line x1="464" y1="340" x2="422" y2="340" stroke="#b3ab99" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- confirmed -->
  <rect x="234" y="302" width="186" height="76" rx="14" fill="#e7f6ee" stroke="#bfe6cf"/>
  <text x="327" y="336" font-size="20" text-anchor="middle">✓</text>
  <text x="327" y="360" font-size="14" font-weight="700" text-anchor="middle" fill="#0f7a45">Customer confirmed</text>

  <!-- QWEN CLOUD platform band -->
  <rect x="234" y="410" width="862" height="70" rx="16" fill="#3a48d6"/>
  <text x="262" y="441" font-size="20">☁</text>
  <text x="292" y="438" font-size="17" font-weight="700" fill="#fff">Qwen Cloud</text>
  <text x="292" y="458" font-size="11.5" fill="#cdd3f6">DashScope International · all LLM reasoning runs here</text>
  <text x="712" y="436" font-size="11.5" font-family="monospace" fill="#fff">Max → qwen3.7-max  (reasoning + tools)</text>
  <text x="712" y="456" font-size="11.5" font-family="monospace" fill="#aeb9ff">Gwen &amp; Quill → qwen3.5-flash  (drafting)</text>
  <!-- the three LLM agents call the cloud band -->
  <line x1="120" y1="445" x2="232" y2="445" stroke="#9aa3e8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="44" y="441" font-size="11" fill="#777163">three LLM</text>
  <text x="44" y="456" font-size="11" fill="#777163">agents call ▸</text>

  <!-- legend -->
  <rect x="40" y="512" width="14" height="14" rx="3" fill="#eef0fb" stroke="#cdd3f6"/>
  <text x="62" y="524" font-size="12" fill="#544f43">Qwen LLM agent</text>
  <rect x="200" y="512" width="14" height="14" rx="3" fill="#fff" stroke="#e7e2d6"/>
  <text x="222" y="524" font-size="12" fill="#544f43">Deterministic guardrail</text>
  <rect x="420" y="512" width="14" height="14" rx="3" fill="#fdf3e2" stroke="#f0d9a8"/>
  <text x="442" y="524" font-size="12" fill="#544f43">Human-in-the-loop</text>
  <text x="40" y="556" font-size="12" fill="#777163">Every step is recorded in a transparent agent trace (agent, model, duration, verdict).</text>
</svg>
